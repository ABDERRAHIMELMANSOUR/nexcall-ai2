<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexCall AI — {% block title %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════
       DESIGN SYSTEM — NexCall AI
       Aesthetic: Industrial Telecom × Brutalist Precision
       Color: Obsidian base · Electric Jade accent · Warning Amber
    ═══════════════════════════════════════════════════ */

    :root {
      /* Palette */
      --ink:       #050709;
      --surface:   #0a0e14;
      --panel:     #0f1520;
      --panel2:    #141c28;
      --border:    #1a2535;
      --border2:   #22304a;
      --jade:      #00e5a0;
      --jade2:     #00b57d;
      --jade-dim:  rgba(0,229,160,.10);
      --jade-glow: rgba(0,229,160,.06);
      --amber:     #ffb547;
      --amber-dim: rgba(255,181,71,.10);
      --crimson:   #ff4560;
      --crimson-dim: rgba(255,69,96,.10);
      --sky:       #38bdf8;
      --sky-dim:   rgba(56,189,248,.10);
      --violet:    #a78bfa;
      --violet-dim: rgba(167,139,250,.10);
      --text:      #d4dde8;
      --text2:     #7a92a8;
      --text3:     #3a5068;

      /* Typography */
      --font-ui:   'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;

      /* Geometry */
      --radius:    6px;
      --radius-lg: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--ink);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ─────────────────────────────────────── */
    .app {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ────────────────────────────────────── */
    .sidebar {
      width: 220px;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 200;
    }

    .sidebar-brand {
      padding: 22px 20px 18px;
      border-bottom: 1px solid var(--border);
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
    }

    .brand-mark {
      width: 32px; height: 32px;
      background: var(--jade);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-mark svg {
      width: 17px; height: 17px;
      fill: var(--ink);
    }

    .brand-name {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.3px;
    }

    .brand-name em {
      color: var(--jade);
      font-style: normal;
    }

    .brand-tag {
      font-size: 9px;
      font-family: var(--font-mono);
      color: var(--text3);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .sidebar-nav {
      padding: 12px 10px;
      flex: 1;
      overflow-y: auto;
    }

    .nav-section-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      padding: 12px 10px 6px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 10px;
      border-radius: var(--radius);
      color: var(--text2);
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      transition: all .15s;
      margin-bottom: 2px;
      position: relative;
    }

    .nav-link:hover {
      background: var(--panel);
      color: var(--text);
    }

    .nav-link.active {
      background: var(--jade-glow);
      color: var(--jade);
      border: 1px solid rgba(0,229,160,.15);
    }

    .nav-link.active::before {
      content: '';
      position: absolute;
      left: -10px; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 18px;
      background: var(--jade);
      border-radius: 0 2px 2px 0;
    }

    .nav-icon {
      width: 18px; height: 18px;
      opacity: .7;
      flex-shrink: 0;
    }

    .nav-link.active .nav-icon { opacity: 1; }

    .sidebar-footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
    }

    .system-status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--text3);
      font-family: var(--font-mono);
    }

    .status-pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--jade);
      box-shadow: 0 0 0 0 rgba(0,229,160,.5);
      animation: pulse-ring 2.5s ease infinite;
    }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(0,229,160,.4); }
      70% { box-shadow: 0 0 0 7px rgba(0,229,160,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,229,160,0); }
    }

    /* ── Main ───────────────────────────────────────── */
    .main-wrap {
      margin-left: 220px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-width: 0;
    }

    .topbar {
      height: 58px;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-left h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -.2px;
    }

    .topbar-left p {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--font-mono);
      margin-top: 1px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .content {
      padding: 28px;
      flex: 1;
    }

    /* ── Cards ──────────────────────────────────────── */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -.1px;
    }

    /* ── Stat Cards ─────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 18px 16px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
    }

    .stat-card.jade::after  { background: var(--jade); }
    .stat-card.amber::after { background: var(--amber); }
    .stat-card.crimson::after { background: var(--crimson); }
    .stat-card.sky::after   { background: var(--sky); }
    .stat-card.violet::after { background: var(--violet); }

    .stat-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px;
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 500;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-card.jade   .stat-value { color: var(--jade); }
    .stat-card.amber  .stat-value { color: var(--amber); }
    .stat-card.crimson .stat-value { color: var(--crimson); }
    .stat-card.sky    .stat-value { color: var(--sky); }
    .stat-card.violet .stat-value { color: var(--violet); }

    .stat-sub {
      font-size: 11px;
      color: var(--text3);
    }

    /* ── Buttons ────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius);
      font-family: var(--font-ui);
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all .15s;
      white-space: nowrap;
    }

    .btn-jade {
      background: var(--jade);
      color: var(--ink);
    }
    .btn-jade:hover { background: var(--jade2); }

    .btn-outline {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border2);
    }
    .btn-outline:hover { border-color: var(--jade); color: var(--jade); }

    .btn-ghost {
      background: var(--panel2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--border2); color: var(--text); }

    .btn-danger {
      background: var(--crimson-dim);
      color: var(--crimson);
      border: 1px solid rgba(255,69,96,.2);
    }
    .btn-danger:hover { background: rgba(255,69,96,.2); }

    .btn-sm { padding: 5px 10px; font-size: 11.5px; }
    .btn-xs { padding: 3px 8px; font-size: 11px; }

    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Tables ─────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      padding: 10px 14px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text3);
      background: var(--panel2);
      border-bottom: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
    }

    tbody td {
      padding: 12px 14px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,.015); }

    /* ── Badges ─────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .3px;
      white-space: nowrap;
    }

    .badge-jade    { background: var(--jade-dim);    color: var(--jade);    border: 1px solid rgba(0,229,160,.2); }
    .badge-amber   { background: var(--amber-dim);   color: var(--amber);   border: 1px solid rgba(255,181,71,.2); }
    .badge-crimson { background: var(--crimson-dim); color: var(--crimson); border: 1px solid rgba(255,69,96,.2); }
    .badge-sky     { background: var(--sky-dim);     color: var(--sky);     border: 1px solid rgba(56,189,248,.2); }
    .badge-violet  { background: var(--violet-dim);  color: var(--violet);  border: 1px solid rgba(167,139,250,.2); }
    .badge-gray    { background: rgba(60,80,100,.2); color: var(--text2);   border: 1px solid var(--border2); }

    /* ── Forms ──────────────────────────────────────── */
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 6px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 9px 12px;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 13.5px;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
      appearance: none;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--jade);
      box-shadow: 0 0 0 3px var(--jade-dim);
    }

    .form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
    .form-textarea { resize: vertical; min-height: 90px; line-height: 1.6; }

    .form-hint {
      font-size: 11px;
      color: var(--text3);
      margin-top: 4px;
      font-family: var(--font-mono);
    }

    /* ── Section panels ─────────────────────────────── */
    .section-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px;
      margin-bottom: 18px;
    }

    .section-panel-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--jade);
    }

    /* ── Alerts ─────────────────────────────────────── */
    .alert {
      padding: 11px 14px;
      border-radius: var(--radius);
      font-size: 12.5px;
      margin-bottom: 16px;
      display: flex;
      align-items: flex-start;
      gap: 9px;
      line-height: 1.5;
    }
    .alert-jade    { background: var(--jade-dim);    color: var(--jade);    border: 1px solid rgba(0,229,160,.2); }
    .alert-amber   { background: var(--amber-dim);   color: var(--amber);   border: 1px solid rgba(255,181,71,.2); }
    .alert-crimson { background: var(--crimson-dim); color: var(--crimson); border: 1px solid rgba(255,69,96,.2); }

    /* ── Modal ──────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(3px);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--panel);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,.6);
    }

    .modal-box.wide { max-width: 720px; }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 15px;
      font-weight: 700;
    }

    .modal-close {
      width: 26px; height: 26px;
      border-radius: 5px;
      background: var(--panel2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .modal-close:hover { background: var(--crimson-dim); color: var(--crimson); border-color: rgba(255,69,96,.3); }

    .modal-footer {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    /* ── Score bar ──────────────────────────────────── */
    .score-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .score-track {
      width: 72px;
      height: 4px;
      background: var(--panel2);
      border-radius: 2px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .4s ease;
    }

    .score-num {
      font-family: var(--font-mono);
      font-size: 11px;
      min-width: 24px;
    }

    /* ── Misc ───────────────────────────────────────── */
    .mono { font-family: var(--font-mono); font-size: 12px; }

    .empty-state {
      text-align: center;
      padding: 52px 20px;
      color: var(--text3);
    }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .empty-state p { font-size: 13px; }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    /* ── Spinner ────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border2);
      border-top-color: var(--jade);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Phone number ───────────────────────────────── */
    .phone-num {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--sky);
      letter-spacing: .3px;
    }

    /* ── Toast ──────────────────────────────────────── */
    #toast-area {
      position: fixed;
      bottom: 22px; right: 22px;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      z-index: 9999;
      pointer-events: none;
    }

    .toast {
      padding: 10px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      pointer-events: all;
      animation: toast-in .25s ease both;
      max-width: 320px;
    }
    @keyframes toast-in { from { transform: translateY(10px); opacity: 0; } to { transform: none; opacity: 1; } }
    .toast-jade    { background: var(--jade);    color: var(--ink); }
    .toast-amber   { background: var(--amber);   color: var(--ink); }
    .toast-crimson { background: var(--crimson); color: white; }

    /* ── Scrollbar ──────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

    /* ── Page transitions ───────────────────────────── */
    .content { animation: fadeUp .25s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  </style>
  {% block extra_styles %}{% endblock %}
</head>
<body>
<div class="app">

  <!-- ═══ SIDEBAR ════════════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <a href="/" class="brand-logo">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
        </div>
        <div>
          <div class="brand-name">Nex<em>Call</em> AI</div>
          <div class="brand-tag">Call Center Platform</div>
        </div>
      </a>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Navigation</div>
      <a href="/" class="nav-link {% if active=='dashboard' %}active{% endif %}">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Dashboard
      </a>
      <a href="/calls" class="nav-link {% if active=='calls' %}active{% endif %}">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
        </svg>
        Appels
      </a>
      <a href="/leads" class="nav-link {% if active=='leads' %}active{% endif %}">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
        Leads
      </a>
      <a href="/campaigns" class="nav-link {% if active=='campaigns' %}active{% endif %}">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
        Campagnes
      </a>

      <div class="nav-section-label">Système</div>
      <a href="/configuration" class="nav-link {% if active=='configuration' %}active{% endif %}">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        Configuration
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="system-status">
        <div class="status-pulse" id="sb-dot"></div>
        <span id="sb-status">Système actif</span>
      </div>
      <div style="font-size:10px;color:var(--text3);font-family:var(--font-mono);margin-top:4px">v1.0.0</div>
    </div>
  </aside>

  <!-- ═══ MAIN ═════════════════════════════════════════════════════ -->
  <div class="main-wrap">
    {% block content %}{% endblock %}
  </div>
</div>

<!-- Toast container -->
<div id="toast-area"></div>

<!-- ═══════════════════════════════════════════════════════════════════
     GLOBAL JAVASCRIPT
     ══════════════════════════════════════════════════════════════════ -->
<script>
/* ─── Toast ─────────────────────────────────────────────────────── */
function toast(msg, type = 'jade', duration = 3500) {
  const area = document.getElementById('toast-area');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  area.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

/* ─── API helper ─────────────────────────────────────────────────── */
async function api(url, opts = {}) {
  const defaults = {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
  };
  const res = await fetch(url, { ...defaults, ...opts });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    const msg = data.detail || data.message || `HTTP ${res.status}`;
    throw new Error(typeof msg === 'string' ? msg : JSON.stringify(msg));
  }
  return data;
}

/* ─── Formatters ─────────────────────────────────────────────────── */
function fDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' })
    + ' ' + d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
}

function fDur(secs) {
  if (!secs) return '0s';
  const m = Math.floor(secs / 60), s = secs % 60;
  return m > 0 ? `${m}m ${String(s).padStart(2,'0')}s` : `${s}s`;
}

function fScore(score) {
  const s = Math.round(score || 0);
  const color = s >= 80 ? 'var(--crimson)' : s >= 60 ? 'var(--amber)' : s >= 30 ? 'var(--jade)' : 'var(--text3)';
  return `<div class="score-wrap">
    <div class="score-track"><div class="score-fill" style="width:${s}%;background:${color}"></div></div>
    <span class="score-num" style="color:${color}">${s}</span>
  </div>`;
}

function badgeStatus(s) {
  const map = {
    incoming:    ['badge-sky',    '↙ Entrant'],
    ringing:     ['badge-sky',    '↙ Sonne'],
    answered:    ['badge-jade',   '✓ Répondu'],
    in_progress: ['badge-jade',   '⟳ En cours'],
    completed:   ['badge-jade',   '✓ Terminé'],
    transferred: ['badge-violet', '↗ Transféré'],
    missed:      ['badge-amber',  '⚠ Manqué'],
    failed:      ['badge-crimson','✕ Échoué'],
  };
  const [cls, lbl] = map[s] || ['badge-gray', s];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function badgeLead(s) {
  const map = {
    hot:       ['badge-crimson', '🔥 Chaud'],
    warm:      ['badge-amber',   '◈ Tiède'],
    qualified: ['badge-jade',    '✓ Qualifié'],
    new:       ['badge-sky',     '✦ Nouveau'],
    cold:      ['badge-gray',    '❄ Froid'],
    converted: ['badge-violet',  '★ Converti'],
    contacted: ['badge-sky',     '◎ Contacté'],
    lost:      ['badge-gray',    '✕ Perdu'],
  };
  const [cls, lbl] = map[s] || ['badge-gray', s];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function badgeCampaign(s) {
  const map = {
    draft:     ['badge-gray',    '✎ Brouillon'],
    active:    ['badge-jade',    '▶ Active'],
    paused:    ['badge-amber',   '⏸ Pausée'],
    completed: ['badge-violet',  '✓ Terminée'],
    archived:  ['badge-gray',    '⟲ Archivée'],
  };
  const [cls, lbl] = map[s] || ['badge-gray', s];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

/* ─── Sidebar status ─────────────────────────────────────────────── */
async function updateSidebarStatus() {
  try {
    const status = await api('/api/config/status');
    const dot = document.getElementById('sb-dot');
    const lbl = document.getElementById('sb-status');
    if (status.ringover.connected && status.openai.configured) {
      dot.style.background = 'var(--jade)';
      lbl.textContent = 'Opérationnel';
    } else {
      dot.style.background = 'var(--amber)';
      dot.style.boxShadow = '0 0 0 0 rgba(255,181,71,.5)';
      lbl.textContent = 'Config. requise';
    }
  } catch {}
}

updateSidebarStatus();
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
