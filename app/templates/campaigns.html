{% extends "base.html" %}
{% block title %}Campagnes — NexCall AI{% endblock %}
{% block content %}
<div style="padding:24px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
    <div>
      <h1 style="font-size:22px;font-weight:800">Campagnes</h1>
      <p style="font-size:13px;color:var(--text3);margin-top:2px">Gérez vos campagnes d'appels automatisées</p>
    </div>
    <a href="/campaigns/new" class="btn btn-primary">+ Créer une campagne</a>
  </div>

  <div id="camps-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadCampaigns() {
  const camps = await apiGet('/api/campaigns/');
  const grid  = document.getElementById('camps-grid');

  if (!camps?.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text3)">
      <div style="font-size:48px;margin-bottom:12px">🚀</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px">Aucune campagne</div>
      <div style="font-size:13px;margin-bottom:20px">Créez votre première campagne d'appels IA</div>
      <a href="/campaigns/new" class="btn btn-primary">+ Créer une campagne</a>
    </div>`;
    return;
  }

  grid.innerHTML = camps.map(c => {
    const typeIcon  = c.campaign_type === 'ai_agent' ? '🤖' : '📋';
    const typeLabel = c.campaign_type === 'ai_agent' ? 'Agent IA' : 'IVR';
    const OFFERS    = {assurance_auto:'🚗 Auto', assurance_sante:'❤️ Santé', mutuelle:'💊 Mutuelle', immobilier:'🏠 Immo', credit:'💳 Crédit'};
    const offerBdg  = c.offer_type ? `<span class="badge badge-gray">${OFFERS[c.offer_type]||c.offer_type}</span>` : '';

    return `
    <div class="card" style="padding:20px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
        <div>
          <div style="font-size:15px;font-weight:700;margin-bottom:5px">${escHtml(c.name)}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${campStatusBadge(c.status)}
            <span class="badge badge-purple">${typeIcon} ${typeLabel}</span>
            ${offerBdg}
          </div>
        </div>
        <div style="font-size:22px">${typeIcon}</div>
      </div>

      <!-- Stats -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
        <div class="card-sm" style="padding:10px;text-align:center">
          <div style="font-size:20px;font-weight:800">${c.total_contacts}</div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Contacts</div>
        </div>
        <div class="card-sm" style="padding:10px;text-align:center">
          <div style="font-size:20px;font-weight:800">${c.calls_made}</div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Appelés</div>
        </div>
        <div class="card-sm" style="padding:10px;text-align:center">
          <div style="font-size:20px;font-weight:800;color:var(--brand)">${c.leads_generated}</div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Leads</div>
        </div>
      </div>

      <!-- Progress bar -->
      ${c.status !== 'draft' ? `
      <div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:4px">
          <span>Progression</span><span>${c.progress_pct}%</span>
        </div>
        <div class="score-bar" style="height:6px"><div class="score-fill" style="width:${c.progress_pct}%"></div></div>
      </div>` : ''}

      <!-- Actions -->
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${c.status === 'draft' || c.status === 'paused' ? `<button class="btn btn-primary btn-sm" onclick="launchCamp(${c.id})">▶ Lancer</button>` : ''}
        ${c.status === 'active' ? `<button class="btn btn-ghost btn-sm" onclick="pauseCamp(${c.id})">⏸ Pause</button>` : ''}
        ${c.campaign_type === 'ivr' ? `<a href="/campaigns/${c.id}/ivr" class="btn btn-ghost btn-sm">📋 IVR</a>` : ''}
        <button class="btn btn-danger btn-sm" onclick="deleteCamp(${c.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

async function launchCamp(id) {
  const r = await apiPost(`/api/campaigns/${id}/launch`, {});
  if (r) { showToast('Campagne lancée !', 'success'); loadCampaigns(); }
}
async function pauseCamp(id) {
  const r = await apiPost(`/api/campaigns/${id}/pause`, {});
  if (r) { showToast('Campagne mise en pause', 'info'); loadCampaigns(); }
}
async function deleteCamp(id) {
  if (!confirm('Supprimer cette campagne ?')) return;
  await apiDel(`/api/campaigns/${id}`);
  showToast('Campagne supprimée', 'info');
  loadCampaigns();
}

loadCampaigns();
</script>
{% endblock %}
