{% extends "base.html" %}
{% block title %}Campagnes{% endblock %}

{% block content %}
<div class="topbar">
  <div class="topbar-left">
    <h1>Campagnes</h1>
    <p>Gestion des campagnes d'appels</p>
  </div>
  <div class="topbar-right">
    <button class="btn btn-ghost btn-sm" onclick="loadCampaigns()">↻ Actualiser</button>
    <button class="btn btn-jade btn-sm" onclick="openCreate()">+ Nouvelle campagne</button>
  </div>
</div>

<div class="content">
  <div id="campaigns-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px">
    <div style="text-align:center;padding:40px;color:var(--text3)"><div class="spinner"></div></div>
  </div>
</div>

<!-- Create / Edit Modal -->
<div class="modal-overlay" id="camp-modal">
  <div class="modal-box wide">
    <div class="modal-head">
      <span class="modal-title" id="camp-modal-title">Nouvelle campagne</span>
      <button class="modal-close" onclick="closeCampModal()">✕</button>
    </div>
    <input type="hidden" id="c-id">
    <div class="form-group">
      <label class="form-label">Nom de la campagne *</label>
      <input class="form-input" id="c-name" placeholder="Campagne Assurance Auto — T1 2025">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="c-desc" style="min-height:65px" placeholder="Objectif et contexte de la campagne..."></textarea>
    </div>
    <div class="form-grid-2">
      <div class="form-group">
        <label class="form-label">Type</label>
        <select class="form-select" id="c-type">
          <option value="inbound">📥 Entrant (Inbound)</option>
          <option value="outbound">📤 Sortant (Outbound)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Intérêt cible</label>
        <select class="form-select" id="c-interest">
          <option value="">— Tous —</option>
          <option value="assurance_auto">Assurance Auto</option>
          <option value="assurance_sante">Assurance Santé</option>
          <option value="assurance_vie">Assurance Vie</option>
          <option value="autre">Autre</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Script IA personnalisé</label>
      <textarea class="form-textarea" id="c-prompt" placeholder="Instructions supplémentaires pour l'agent IA dans cette campagne. Ex: 'Mets en avant l'offre promotionnelle -20% sur l'assurance auto...'"></textarea>
      <div class="form-hint">Si vide, le script par défaut sera utilisé.</div>
    </div>
    <div class="form-group">
      <label class="form-label">Message IVR personnalisé</label>
      <textarea class="form-textarea" id="c-ivr" style="min-height:65px" placeholder="Laissez vide pour utiliser le message IVR global"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-jade" id="camp-save-btn" onclick="saveCampaign()">Enregistrer</button>
      <button class="btn btn-ghost" onclick="closeCampModal()">Annuler</button>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function campCard(c) {
  const answerRate = c.total_calls > 0 ? Math.round(c.answered_calls / c.total_calls * 100) : 0;
  return `
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden">
      <div style="padding:18px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div>
            <div style="font-weight:700;font-size:14px;margin-bottom:3px">${c.name}</div>
            <div style="font-size:11px;color:var(--text3)">
              ${c.type === 'inbound' ? '📥 Entrant' : '📤 Sortant'}
              ${c.target_interest ? ' · ' + c.target_interest.replace(/_/g,' ') : ''}
            </div>
          </div>
          ${badgeCampaign(c.status)}
        </div>
        ${c.description ? `<div style="font-size:12px;color:var(--text2);line-height:1.55">${c.description}</div>` : ''}
      </div>
      <div style="padding:14px 18px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;border-bottom:1px solid var(--border)">
        <div style="text-align:center">
          <div style="font-family:var(--font-mono);font-size:22px;color:var(--jade);font-weight:500">${c.total_calls}</div>
          <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px">Appels</div>
        </div>
        <div style="text-align:center">
          <div style="font-family:var(--font-mono);font-size:22px;color:var(--sky);font-weight:500">${answerRate}%</div>
          <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px">Réponse</div>
        </div>
        <div style="text-align:center">
          <div style="font-family:var(--font-mono);font-size:22px;color:var(--amber);font-weight:500">${c.leads_generated}</div>
          <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px">Leads</div>
        </div>
        <div style="text-align:center">
          <div style="font-family:var(--font-mono);font-size:22px;color:var(--violet);font-weight:500">${c.transferred_calls}</div>
          <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px">Transferts</div>
        </div>
      </div>
      <div style="padding:12px 16px;display:flex;gap:7px;flex-wrap:wrap">
        ${c.status === 'draft' || c.status === 'paused'
          ? `<button class="btn btn-jade btn-sm" onclick="activate(${c.id})">▶ Activer</button>` : ''}
        ${c.status === 'active'
          ? `<button class="btn btn-ghost btn-sm" onclick="pause(${c.id})">⏸ Pause</button>` : ''}
        ${c.status === 'active'
          ? `<button class="btn btn-outline btn-sm" onclick="complete(${c.id})">✓ Terminer</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="editCamp(${c.id})">✎ Modifier</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCamp(${c.id})">✕</button>
      </div>
    </div>
  `;
}

async function loadCampaigns() {
  const camps = await api('/api/campaigns').catch(() => []);
  const grid = document.getElementById('campaigns-grid');
  if (!camps.length) {
    grid.innerHTML = `<div style="grid-column:1/-1"><div class="empty-state">
      <div class="empty-icon">🎯</div>
      <p>Aucune campagne — créez-en une pour démarrer</p>
    </div></div>`;
    return;
  }
  grid.innerHTML = camps.map(campCard).join('');
}

function openCreate() {
  document.getElementById('camp-modal-title').textContent = 'Nouvelle campagne';
  document.getElementById('c-id').value = '';
  ['name','desc','prompt','ivr'].forEach(f => document.getElementById('c-'+f).value = '');
  document.getElementById('c-type').value = 'inbound';
  document.getElementById('c-interest').value = '';
  document.getElementById('camp-modal').classList.add('open');
}

async function editCamp(id) {
  const c = await api(`/api/campaigns/${id}`);
  document.getElementById('camp-modal-title').textContent = 'Modifier la campagne';
  document.getElementById('c-id').value      = id;
  document.getElementById('c-name').value    = c.name || '';
  document.getElementById('c-desc').value    = c.description || '';
  document.getElementById('c-type').value    = c.type || 'inbound';
  document.getElementById('c-interest').value= c.target_interest || '';
  document.getElementById('c-prompt').value  = c.ai_system_prompt || '';
  document.getElementById('c-ivr').value     = c.ivr_message || '';
  document.getElementById('camp-modal').classList.add('open');
}

function closeCampModal() { document.getElementById('camp-modal').classList.remove('open'); }

async function saveCampaign() {
  const id = document.getElementById('c-id').value;
  const name = document.getElementById('c-name').value.trim();
  if (!name) { toast('Le nom est requis', 'amber'); return; }

  const payload = {
    name,
    description:      document.getElementById('c-desc').value    || null,
    type:             document.getElementById('c-type').value,
    target_interest:  document.getElementById('c-interest').value || null,
    ai_system_prompt: document.getElementById('c-prompt').value   || null,
    ivr_message:      document.getElementById('c-ivr').value      || null,
  };

  const btn = document.getElementById('camp-save-btn');
  btn.disabled = true;
  try {
    if (id) {
      await api(`/api/campaigns/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
      toast('Campagne mise à jour !', 'jade');
    } else {
      await api('/api/campaigns', { method: 'POST', body: JSON.stringify(payload) });
      toast('Campagne créée !', 'jade');
    }
    closeCampModal();
    loadCampaigns();
  } catch(e) { toast(e.message, 'crimson'); }
  btn.disabled = false;
}

async function activate(id) {
  await api(`/api/campaigns/${id}/activate`, { method: 'POST' });
  toast('Campagne activée !', 'jade');
  loadCampaigns();
}
async function pause(id) {
  await api(`/api/campaigns/${id}/pause`, { method: 'POST' });
  toast('Campagne mise en pause', 'amber');
  loadCampaigns();
}
async function complete(id) {
  if (!confirm('Marquer cette campagne comme terminée ?')) return;
  await api(`/api/campaigns/${id}/complete`, { method: 'POST' });
  toast('Campagne terminée', 'violet');
  loadCampaigns();
}
async function deleteCamp(id) {
  if (!confirm('Supprimer cette campagne ?')) return;
  await api(`/api/campaigns/${id}`, { method: 'DELETE' });
  toast('Campagne supprimée', 'amber');
  loadCampaigns();
}

loadCampaigns();
</script>
{% endblock %}
