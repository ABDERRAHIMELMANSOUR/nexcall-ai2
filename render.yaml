services:
  - type: web
    name: nexcall-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_API_KEY
        sync: false
      - key: RINGOVER_API_KEY
        sync: false
      - key: RINGOVER_PHONE_NUMBER
        sync: false
      - key: RINGOVER_TRANSFER_NUMBER
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: AI_AGENT_NAME
        value: Sophie
      - key: AI_COMPANY_NAME
        value: AssurancePro
